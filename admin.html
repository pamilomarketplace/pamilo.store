    <script type="module">
        // 1. Mengimpor Supabase dengan jalur paling aman dan pasti terbaca
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // 2. Kunci Akses Supabase
        const SUPABASE_URL = 'https://fzqdeztlpslhxwdicvnq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6cWRlenRscHNsaHh3ZGljdm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzI3NTYsImV4cCI6MjA5NDUwODc1Nn0.3ZCCDPfawASAEU0gCZv8c3LnWNjvV9W-wulkny04CX4';
        
        // 3. Inisialisasi Database PAMILO
        const pamiloDb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 4. Fungsi Slug - Ditempelkan ke sistem utama (window) agar bisa dibaca HTML
        window.buatSlug = function() {
            const judul = document.getElementById('b_judul').value;
            const slug = judul.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
            document.getElementById('b_slug').value = slug;
        };

        // 5. Eksekusi Utama - Ditempelkan ke sistem utama
        window.terbitkanBerita = async function(event) {
            // Perintah mengunci halaman agar TIDAK refresh!
            event.preventDefault(); 
            
            try {
                const btn = document.getElementById('btnSubmit');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
                btn.disabled = true;

                const dataBerita = {
                    judul: document.getElementById('b_judul').value,
                    slug: document.getElementById('b_slug').value,
                    kategori: document.getElementById('b_kategori').value,
                    gambar_thumbnail: document.getElementById('b_gambar').value || null,
                    konten: document.getElementById('b_konten').value,
                    status: document.getElementById('b_status').value
                };

                // Menembakkan peluru data ke Supabase
                const { error } = await pamiloDb.from('berita_website').insert([dataBerita]);

                // Mengembalikan warna & tulisan tombol
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publikasikan Artikel';
                btn.disabled = false;

                if (error) {
                    // Deteksi jika gembok RLS Supabase belum dibuka
                    if(error.code === '42501') {
                        Swal.fire('Gembok Keamanan Aktif', 'Supabase menolak data. Anda harus membuka izin (Policy) Insert untuk tabel berita_website di dashboard Supabase.', 'error');
                    } else {
                        Swal.fire('Gagal Menyimpan', error.message, 'error');
                    }
                } else {
                    document.getElementById('formBerita').reset();
                    Swal.fire({
                        title: 'Berhasil Mengudara! 🚀',
                        text: 'Artikel Anda telah diterbitkan dan tampil di pamilo.store',
                        icon: 'success',
                        confirmButtonColor: '#8CAED1'
                    });
                }
            } catch (err) {
                console.error("Masalah Eksekusi:", err);
                Swal.fire('Sistem Error', err.message, 'error');
                
                const btn = document.getElementById('btnSubmit');
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publikasikan Artikel';
                btn.disabled = false;
            }
        };
    </script>
