<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baca Berita - PAMILO</title>

    <meta property="og:title" content="Baca Berita - PAMILO">
    <meta property="og:description" content="Kabar terbaru, informasi mitra, dan promo menarik dari PAMILO.">
    <meta property="og:type" content="article">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        pamilo: { 
                            dark: '#4A3525', 
                            orange: '#D35400', 
                            cream: '#FFF3E0', 
                            light: '#FAF8F5',
                            softblue: '#8CAED1'
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-pamilo-light font-sans text-gray-800 antialiased overflow-x-hidden relative flex flex-col min-h-screen">

    <nav class="fixed w-full z-40 bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition group">
                    <div class="w-10 h-10 bg-pamilo-light rounded-xl flex items-center justify-center group-hover:bg-pamilo-orange transition">
                        <i class="fas fa-arrow-left text-pamilo-dark group-hover:text-white text-lg transition"></i>
                    </div>
                    <span class="font-bold text-gray-600 hidden sm:block">Kembali ke Beranda</span>
                </a>
                <span class="font-black text-2xl tracking-wide text-pamilo-dark">PAMILO</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div id="loadingState" class="text-center py-24">
                <i class="fas fa-spinner fa-spin text-4xl text-pamilo-softblue mb-4"></i>
                <p class="text-gray-500 font-medium">Membuka lembaran informasi...</p>
            </div>

            <div id="errorState" class="hidden text-center py-24 bg-white rounded-3xl border border-gray-100 shadow-sm">
                <i class="fas fa-search text-6xl text-gray-300 mb-6"></i>
                <h2 class="text-2xl font-black text-pamilo-dark mb-2">Berita Tidak Ditemukan</h2>
                <p class="text-gray-500 mb-8">Maaf, artikel yang Anda cari mungkin sudah dihapus atau link tidak valid.</p>
                <a href="index.html" class="bg-pamilo-orange text-white px-8 py-3 rounded-full font-bold hover:bg-[#A04000] transition">Kembali ke Beranda</a>
            </div>

            <article id="articleContent" class="hidden bg-white rounded-[2rem] shadow-xl overflow-hidden border border-gray-100">
                <div id="a_gambar_wadah" class="w-full h-64 md:h-96 bg-gray-100 relative">
                    <span id="a_kategori" class="absolute top-6 left-6 bg-white/90 backdrop-blur-md text-pamilo-dark text-sm font-bold px-4 py-2 rounded-full z-10 shadow-sm"></span>
                    <img id="a_gambar" src="" alt="Thumbnail Berita" class="w-full h-full object-cover">
                </div>
                
                <div class="p-8 md:p-12">
                    <div class="flex items-center text-sm text-gray-500 mb-4 font-semibold">
                        <i class="far fa-calendar-alt mr-2 text-pamilo-orange"></i>
                        <span id="a_tanggal">Memuat tanggal...</span>
                    </div>
                    
                    <h1 id="a_judul" class="text-3xl md:text-4xl font-black text-pamilo-dark mb-8 leading-tight"></h1>
                    
                    <div id="a_konten" class="text-gray-700 leading-relaxed space-y-4 whitespace-pre-wrap text-[1.1rem]"></div>
                </div>
            </article>

        </div>
    </main>

    <footer class="bg-[#2D1F16] text-gray-400 py-10 text-center text-sm">
        <p>&copy; 2026 PAMILO. All rights reserved.</p>
    </footer>

    <script type="module">
        import { pamiloDb } from './supabase.js';

        async function muatDetailBerita() {
            // Mengambil 'slug' dari alamat URL browser
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            // Jika tidak ada slug di URL, tampilkan error
            if (!slug) {
                tampilkanError();
                return;
            }

            try {
                // Mencari artikel yang slug-nya cocok di database
                const { data, error } = await pamiloDb
                    .from('berita_website')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error || !data) throw error;

                // BERHASIL! Sembunyikan loading, tampilkan artikel
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('articleContent').classList.remove('hidden');

                // Memasukkan data ke dalam halaman HTML
                document.getElementById('a_kategori').innerText = data.kategori;
                document.getElementById('a_judul').innerText = data.judul;
                document.getElementById('a_konten').innerText = data.konten;
                
                // Format Tanggal jadi gaya Indonesia (Misal: 3 Juni 2026)
                const tgl = new Date(data.created_at);
                const opsiTgl = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('a_tanggal').innerText = tgl.toLocaleDateString('id-ID', opsiTgl);

                // Mengatur Gambar
                const gambarEl = document.getElementById('a_gambar');
                if (data.gambar_thumbnail) {
                    gambarEl.src = data.gambar_thumbnail;
                } else {
                    // Pakai gambar default keren kalau admin tidak upload gambar
                    gambarEl.src = 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=1200';
                }

            } catch (err) {
                console.error('Berita tidak ditemukan:', err);
                tampilkanError();
            }
        }

        function tampilkanError() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
        }

        // Jalankan fungsi saat halaman selesai dimuat
        window.addEventListener('DOMContentLoaded', muatDetailBerita);
    </script>
</body>
</html>
